name: Build Poco F1

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      # 1. Kernel Branch
      KERNEL_BRANCH:
        description: "Branch Kernel"
        required: true
        default: "staging"
        type: string
      # 2. Defconfig
      DEFCONFIG_NAME:
        description: "Defconfig Name"
        required: true
        default: "vendor/xiaomi/mi845_defconfig"
        type: string
      # 3. KernelSU
      KERNELSU_AUTO_FORK:
        description: "Versi / Fork KernelSU"
        required: true
        default: "resukisu"
        type: choice
        options:
          - resukisu
          - xxksu
          - rsuntk
          - next
          - sukisu
      # 4. SUSFS
      SUSFS_ENABLE:
        description: "Aktifkan SUSFS"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      # 5. AK3 (AnyKernel3)
      AK3_BRANCH:
        description: "Branch AnyKernel3"
        required: true
        default: "master"
        type: string
      # 6. Pack Method
      PACK_METHOD:
        description: "Metode Kemas (Pack)"
        required: true
        default: "Anykernel3"
        type: choice
        options:
          - Anykernel3
          - MKBOOTIMG
      # 7. Patch Branch
      PATCHES_BRANCH:
        description: "Branch Patch (NonGKI)"
        required: true
        default: "mi_kernel"
        type: string
      # 8. Hook Method
      HOOK_METHOD:
        description: "Metode Hook"
        required: true
        default: "syscall"
        type: string
      # 9. KPM
      KPM_ENABLE:
        description: "Aktifkan KPM"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      # 10. Debugger
      BUILD_DEBUGGER:
        description: "Aktifkan Build Debugger (Output Log Error)"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

env:
  # Lingkungan Perangkat
  DEVICE_NAME: "Poco_F1"
  DEVICE_CODENAME: "beryllium"

  CUSTOM_CMDS: "CLANG_TRIPLE=aarch64-linux-gnu-"
  EXTRA_CMDS: "LD=ld.lld"

  KERNEL_SOURCE: "https://github.com/kyzuna28/kyy.git"
  KERNEL_BRANCH: ${{ inputs.KERNEL_BRANCH || 'nse' }}

  CLANG_SOURCE: "https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b.git"
  CLANG_BRANCH: "lineage-20.0"

  GCC_GNU: "false"
  GCC_64_SOURCE: "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9.git"
  GCC_64_BRANCH: "android12L-release"
  GCC_32_SOURCE: "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9.git"
  GCC_32_BRANCH: "android12L-release"

  DEFCONFIG_SOURCE: ""
  DEFCONFIG_NAME: ${{ inputs.DEFCONFIG_NAME || 'defconfig' }}
  DEFCONFIG_ORIGIN_IMAGE: ""
  DEFCONFIG_FROM_BOOT: "false"

  KERNELSU_SOURCE: ""
  KERNELSU_BRANCH: ""

  KERNELSU_AUTO_GET: "true"
  KERNELSU_AUTO_FORK: ${{ inputs.KERNELSU_AUTO_FORK || 'resukisu' }}

  SUSFS_ENABLE: ${{ inputs.SUSFS_ENABLE || 'true' }}
  SUSFS_FIXED: "true"

  AK3_SOURCE: "https://github.com/osm0sis/AnyKernel3.git"
  AK3_BRANCH: ${{ inputs.AK3_BRANCH || 'master' }}

  BOOT_SOURCE: ""

  NEED_DTBO: "false"
  NEED_SAFE_DTBO: "false"

  ROM_TEXT: "beryllium"

  # Lingkungan Lainnya
  PYTHON_VERSION: "3" 

  PACK_METHOD: ${{ inputs.PACK_METHOD || 'Anykernel3' }}
  PACK_KMODULES: "false" 

  KERNELSU_METHOD: "shell" 
  KERNELSU_SUS_PATCH: "false" 

  PATCHES_SOURCE: "JackA1ltman/NonGKI_Kernel_Patches" 
  PATCHES_BRANCH: ${{ inputs.PATCHES_BRANCH || 'mi_kernel' }}

  SUSFS_FOLDER_FIXED: "mix2s_evox_a15" 
  SUSFS_PATCH_FIXED: "susfs_fixed" 

  REKERNEL_ENABLE: "true" 
  DROIDSPACES_ENABLE: "true" 

  HOOK_METHOD: ${{ inputs.HOOK_METHOD || 'syscall' }}

  KERNEL_PATCH: "false" 

  KPM_ENABLE: ${{ inputs.KPM_ENABLE || 'false' }}
  KPM_INLINE: "false" 
  KPM_KPATCH_NEXT: "false" 
  KPM_PATCH_SOURCE: "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU_patch/refs/heads/main/kpm/patch_linux" 

  BASEBAND_GUARD_ENABLE: "true" 
  BASEBAND_GUARD_BOOT: "false" 

  GENERATE_DTB: "false" 
  GENERATE_CHIP: "qcom" 

  BUILD_DEBUGGER: ${{ inputs.BUILD_DEBUGGER || 'false' }}
  SKIP_PATCH: "false" 

  BUILD_OTHER_CONFIG: "true" 
  MERGE_CONFIG_FILES: "vendor/xiaomi/polaris.config,vendor/debugfs.config"

  FREE_MORE_SPACE: "false" 

jobs:
  build-kernel:
    name: Poco F1
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      - name: ⏰ Checkout repository
        uses: actions/checkout@v4

      - name: ⌛️ Compilation environment preparation
        uses: ./.github/workflows/build-env

      - name: ⚙️ Get necessary tools
        uses: ./.github/workflows/build-ready

      - name: 🪝 Patch Kernel of SUSFS
        uses: ./.github/workflows/patch-susfs

      - name: 🔗 Patch for no-kprobe
        uses: ./.github/workflows/patch-no-kprobe

      - name: 🪛 Extra Kernel Options
        run: |
          cd $GITHUB_WORKSPACE/device_kernel
          # Tidak ada apa-apa

      - name: 🧰 Patch Kernel of Re:Kernel
        uses: ./.github/workflows/patch-rekernel

      - name: 💿 Patch Kernel of Droidspaces
        uses: ./.github/workflows/patch-droidspaces

      - name: 🔒 Patch Kernel of Baseband Guard
        uses: ./.github/workflows/patch-baseband-guard

      - name: 🚀 Build Process
        uses: ./.github/workflows/build-process

      - name: 🔩 Pack Process
        uses: ./.github/workflows/pack-process

      - name: ✏️ Upload Artifacts
        uses: ./.github/workflows/upload-files
        
